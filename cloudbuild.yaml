steps:
  # 1. Build Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west1-docker.pkg.dev/$PROJECT_ID/karocompliance-repo/backend:$COMMIT_SHA', './backend']

  # 2. Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/karocompliance-repo/backend:$COMMIT_SHA']

  # 3. Build Frontend Image (Using Production Dockerfile)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', './frontend/Dockerfile.prod', '-t', 'europe-west1-docker.pkg.dev/$PROJECT_ID/karocompliance-repo/frontend:$COMMIT_SHA', './frontend']

  # 4. Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/karocompliance-repo/frontend:$COMMIT_SHA']

  # 5. Deploy FastAPI Backend (NemoClaw API) to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'karocompliance'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/karocompliance-repo/backend:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,REDIS_URL=REDIS_URL:latest,NVIDIA_API_KEY=NVIDIA_API_KEY:latest,WHATSAPP_WEBHOOK_SECRET=WHATSAPP_WEBHOOK_SECRET:latest,GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest,STORAGE_BACKEND=STORAGE_BACKEND:latest'

  # 6. Deploy React Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'karocompliance-ui'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/karocompliance-repo/frontend:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=VITE_API_URL=https://karo-backend-xxx.a.run.app' # Note: Update with actual backend URL

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/karocompliance-repo/backend:$COMMIT_SHA'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/karocompliance-repo/frontend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY